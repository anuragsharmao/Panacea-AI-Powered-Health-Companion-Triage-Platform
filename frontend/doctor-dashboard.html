<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panacea — Doctor Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f7f6f3; color: #1e2a2e; }
        
        .navbar {
            background: white;
            border-bottom: 1px solid #e2e4e0;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 24px; font-weight: 600; background: linear-gradient(135deg, #2c7a6e, #3b82b6); -webkit-background-clip: text; background-clip: text; color: transparent; text-decoration: none; }
        .nav-links { display: flex; gap: 32px; }
        .nav-links a { text-decoration: none; color: #4a5b5e; font-weight: 500; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 32px 40px; }
        
        .welcome-card {
            background: linear-gradient(135deg, #0d2226, #1a3d45);
            border-radius: 32px;
            padding: 32px;
            color: white;
            margin-bottom: 32px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid #e2e4e0;
        }
        .stat-number { font-size: 28px; font-weight: 700; color: #2c7a6e; }
        
        .section {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #e2e4e0;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e2e4e0;
        }
        
        .request-card {
            border: 1px solid #e2e4e0;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .patient-name { font-weight: 600; font-size: 16px; }
        .request-date { font-size: 12px; color: #8b9a9e; }
        
        .cart-items-preview {
            background: #f7f6f3;
            border-radius: 16px;
            padding: 12px;
            margin: 12px 0;
            font-size: 13px;
        }
        
        .btn-approve {
            background: #2c7a6e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            margin-right: 12px;
        }
        .btn-reject {
            background: #e2e4e0;
            color: #1e2a2e;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1e2a2e;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            z-index: 1000;
        }
        
        @media (max-width: 768px) {
            .container { padding: 20px; }
            .navbar { padding: 12px 20px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">panacea</a>
        <div class="nav-links">
            <a href="doctor-dashboard.html">Dashboard</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="welcome-card">
            <h1 id="doctorName">Doctor Dashboard</h1>
            <p>Manage consultations and prescription requests</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="pendingConsults">-</div><div>Pending Consultations</div></div>
            <div class="stat-card"><div class="stat-number" id="pendingShares">-</div><div>Pending Cart Shares</div></div>
            <div class="stat-card"><div class="stat-number" id="totalPrescriptions">-</div><div>Total Prescriptions</div></div>
        </div>
        
        <div class="section">
            <div class="section-title">📋 Pending Prescription Approvals (Cart Shares)</div>
            <div id="cartSharesContainer">Loading...</div>
        </div>
        
        <div class="section">
            <div class="section-title">👨‍⚕️ Pending Consultation Requests</div>
            <div id="consultationsContainer">Loading...</div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let sessionToken = localStorage.getItem('panacea_session_token');
        let currentUser = null;
        
        async function loadDoctor() {
            if (!sessionToken) {
                showToast('Please login as doctor');
                setTimeout(() => location.href = 'index.html', 2000);
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/api/auth/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_token: sessionToken })
                });
                if (res.ok) {
                    const data = await res.json();
                    if (data.valid && data.user.user_type === 'doctor') {
                        currentUser = data.user;
                        document.getElementById('doctorName').innerHTML = `Welcome back, Dr. ${currentUser.name}`;
                        loadAllData();
                    } else {
                        showToast('Doctor access only');
                        setTimeout(() => location.href = 'index.html', 1500);
                    }
                }
            } catch(e) {}
        }
        
        async function loadAllData() {
            await Promise.all([
                loadCartShares(),
                loadConsultations(),
                loadStats()
            ]);
        }
        
        async function loadStats() {
            try {
                const consults = await fetch(`${API_BASE}/api/consultations`, {
                    headers: { 'X-Session-Token': sessionToken }
                });
                const shares = await fetch(`${API_BASE}/api/cart/shares/pending`, {
                    headers: { 'X-Session-Token': sessionToken }
                });
                
                if (consults.ok) {
                    const cData = await consults.json();
                    const pending = cData.consultations.filter(c => c.status === 'pending');
                    document.getElementById('pendingConsults').innerText = pending.length;
                }
                if (shares.ok) {
                    const sData = await shares.json();
                    document.getElementById('pendingShares').innerText = sData.shares.length;
                }
            } catch(e) {}
        }
        
        async function loadCartShares() {
            try {
                const res = await fetch(`${API_BASE}/api/cart/shares/pending`, {
                    headers: { 'X-Session-Token': sessionToken }
                });
                if (res.ok) {
                    const data = await res.json();
                    renderCartShares(data.shares);
                    document.getElementById('pendingShares').innerText = data.shares.length;
                }
            } catch(e) {
                document.getElementById('cartSharesContainer').innerHTML = '<p>Failed to load</p>';
            }
        }
        
        function renderCartShares(shares) {
            const container = document.getElementById('cartSharesContainer');
            if (!shares.length) {
                container.innerHTML = '<p>No pending prescription requests</p>';
                return;
            }
            
            container.innerHTML = shares.map(share => `
                <div class="request-card">
                    <div class="request-header">
                        <div>
                            <span class="patient-name">${escapeHtml(share.patient_name)}</span>
                            <span style="font-size:12px; color:#8b9a9e; margin-left:12px;">${escapeHtml(share.patient_email)}</span>
                        </div>
                        <div class="request-date">${new Date(share.created_at).toLocaleString()}</div>
                    </div>
                    <div class="cart-items-preview">
                        <strong>Medicines requested:</strong>
                        <ul style="margin-top: 8px; margin-left: 20px;">
                            ${share.cart_snapshot.map(item => `
                                <li>${escapeHtml(item.name)} x ${item.quantity} ${item.requires_prescription ? '🔒' : ''}</li>
                            `).join('')}
                        </ul>
                    </div>
                    <p><strong>Message:</strong> ${escapeHtml(share.patient_message || 'No message')}</p>
                    <textarea id="note_${share.id}" placeholder="Add prescription notes... (optional)" 
                              style="width:100%; margin: 12px 0; padding:10px; border:1px solid #e2e4e0; border-radius:12px;"></textarea>
                    <div>
                        <button class="btn-approve" onclick="respondToCartShare(${share.id}, true)">✓ Approve & Issue Prescription</button>
                        <button class="btn-reject" onclick="respondToCartShare(${share.id}, false)">✗ Reject</button>
                    </div>
                </div>
            `).join('');
        }
        
        async function respondToCartShare(shareId, approve) {
            const note = document.getElementById(`note_${shareId}`)?.value || '';
            
            try {
                const res = await fetch(`${API_BASE}/api/cart/share/respond`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken },
                    body: JSON.stringify({ share_id: shareId, approve, note })
                });
                if (res.ok) {
                    showToast(approve ? 'Prescription issued successfully!' : 'Request rejected');
                    loadCartShares();
                    loadStats();
                } else {
                    showToast('Failed to respond');
                }
            } catch(e) {
                showToast('Error');
            }
        }
        
        async function loadConsultations() {
            try {
                const res = await fetch(`${API_BASE}/api/consultations`, {
                    headers: { 'X-Session-Token': sessionToken }
                });
                if (res.ok) {
                    const data = await res.json();
                    const pending = data.consultations.filter(c => c.status === 'pending');
                    renderConsultations(pending);
                }
            } catch(e) {
                document.getElementById('consultationsContainer').innerHTML = '<p>Failed to load</p>';
            }
        }
        
        function renderConsultations(consultations) {
            const container = document.getElementById('consultationsContainer');
            if (!consultations.length) {
                container.innerHTML = '<p>No pending consultation requests</p>';
                return;
            }
            
            container.innerHTML = consultations.map(c => `
                <div class="request-card">
                    <div class="request-header">
                        <div>
                            <span class="patient-name">${escapeHtml(c.patient_name)}</span>
                            <span style="font-size:12px; color:#8b9a9e; margin-left:12px;">${escapeHtml(c.patient_email)}</span>
                        </div>
                        <div class="request-date">${new Date(c.created_at).toLocaleString()}</div>
                    </div>
                    <p><strong>Symptoms/Prediction:</strong> ${escapeHtml(c.top_disease || c.predicted_disease || 'Not specified')}</p>
                    <p><strong>Message:</strong> ${escapeHtml(c.patient_message || 'No message')}</p>
                    <textarea id="consult_note_${c.id}" placeholder="Your response to patient..." 
                              style="width:100%; margin: 12px 0; padding:10px; border:1px solid #e2e4e0; border-radius:12px;"></textarea>
                    <div>
                        <button class="btn-approve" onclick="respondToConsultation(${c.id}, true)">✓ Accept Consultation</button>
                        <button class="btn-reject" onclick="respondToConsultation(${c.id}, false)">✗ Decline</button>
                    </div>
                </div>
            `).join('');
        }
        
        async function respondToConsultation(requestId, accept) {
            const response = document.getElementById(`consult_note_${requestId}`)?.value || '';
            
            try {
                const res = await fetch(`${API_BASE}/api/consultations/respond`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken },
                    body: JSON.stringify({ request_id: requestId, accept, response })
                });
                if (res.ok) {
                    showToast(accept ? 'Consultation accepted!' : 'Consultation declined');
                    loadConsultations();
                    loadStats();
                } else {
                    showToast('Failed to respond');
                }
            } catch(e) {
                showToast('Error');
            }
        }
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function logout() {
            localStorage.removeItem('panacea_session_token');
            localStorage.removeItem('panacea_user_id');
            window.location.href = 'index.html';
        }
        
        loadDoctor();
    </script>
</body>
</html>
