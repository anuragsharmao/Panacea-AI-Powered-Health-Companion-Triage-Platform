<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panacea — Consult Doctors</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f7f6f3; color: #1e2a2e; }
        
        .navbar {
            background: white;
            border-bottom: 1px solid #e2e4e0;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .logo {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #2c7a6e, #3b82b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        .nav-links { display: flex; gap: 32px; align-items: center; }
        .nav-links a { text-decoration: none; color: #4a5b5e; font-weight: 500; }
        .nav-links a:hover, .nav-links a.active { color: #2c7a6e; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 32px 40px; }
        
        .hero-section {
            background: linear-gradient(135deg, #0d2226, #1a3d45);
            border-radius: 32px;
            padding: 48px;
            color: white;
            margin-bottom: 40px;
        }
        .hero-section h1 { font-size: 36px; margin-bottom: 16px; }
        
        .filter-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        .filter-bar input, .filter-bar select {
            padding: 14px 20px;
            border: 1.5px solid #e2e4e0;
            border-radius: 16px;
            font-size: 14px;
            background: white;
            flex: 1;
        }
        
        .doctors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        .doctor-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #e2e4e0;
            transition: all 0.25s;
        }
        .doctor-card:hover { transform: translateY(-4px); box-shadow: 0 12px 28px -8px rgba(0,0,0,0.1); }
        .doctor-header { display: flex; gap: 16px; align-items: center; margin-bottom: 16px; }
        .doctor-avatar {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #2c7a6e, #3b82b6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }
        .doctor-name { font-size: 18px; font-weight: 700; }
        .doctor-specialization { color: #2c7a6e; font-size: 14px; font-weight: 500; margin-top: 4px; }
        .doctor-rating { display: flex; align-items: center; gap: 4px; margin: 12px 0; }
        .rating-stars { color: #f39c12; }
        .doctor-fee { font-size: 20px; font-weight: 700; color: #2c7a6e; margin: 12px 0; }
        .consult-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1e2a2e, #2c7a6e);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .verified-badge { display: inline-block; background: #d4e6d9; color: #2d6a4f; font-size: 10px; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
        }
        .modal-content textarea {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e2e4e0;
            border-radius: 16px;
            margin: 16px 0;
        }
        
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1e2a2e;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            z-index: 1000;
        }
        
        @media (max-width: 768px) {
            .container { padding: 20px; }
            .hero-section { padding: 28px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">panacea</a>
        <div class="nav-links">
            <a href="assessment.html">Symptom Checker</a>
            <a href="pharmacy.html">Pharmacy</a>
            <a href="consultation.html" class="active">Consult Doctor</a>
            <a href="patient-dashboard.html">My Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <div class="hero-section">
            <h1>👨‍⚕️ Consult a Doctor</h1>
            <p>Connect with verified specialists based on your symptoms and predicted conditions</p>
        </div>
        
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="Search doctors by name or specialization...">
            <select id="specializationSelect">
                <option value="">All Specializations</option>
            </select>
        </div>
        
        <div id="doctorsContainer" class="doctors-grid">
            <div class="loading" style="text-align:center; padding:60px;">Loading doctors...</div>
        </div>
    </div>
    
    <div id="consultModal" class="modal">
        <div class="modal-content">
            <h2>Request Consultation</h2>
            <p id="selectedDoctorName" style="color:#2c7a6e; margin: 8px 0;"></p>
            <textarea id="consultMessage" rows="4" placeholder="Describe your symptoms or why you need consultation..."></textarea>
            <input type="hidden" id="selectedDoctorId">
            <button class="consult-btn" onclick="submitConsultation()">Send Request</button>
            <button class="consult-btn" onclick="closeModal()" style="background:#e2e4e0; color:#1e2a2e; margin-top: 8px;">Cancel</button>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let sessionToken = localStorage.getItem('panacea_session_token');
        let currentUser = null;
        let doctors = [];
        let specializations = [];
        let pendingAssessment = null;

        async function loadUser() {
            if (!sessionToken) {
                showToast('Please login to consult doctors');
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/api/auth/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_token: sessionToken })
                });
                if (res.ok) {
                    const data = await res.json();
                    if (data.valid) currentUser = data.user;
                }
            } catch(e) {}
            loadSpecializations();
            loadDoctors();
            checkForPendingAssessment();
        }

        async function loadSpecializations() {
            try {
                const res = await fetch(`${API_BASE}/api/doctors/specializations`);
                const data = await res.json();
                specializations = data.specializations;
                const select = document.getElementById('specializationSelect');
                specializations.forEach(spec => {
                    const option = document.createElement('option');
                    option.value = spec;
                    option.textContent = spec;
                    select.appendChild(option);
                });
            } catch(e) {}
        }

        async function loadDoctors() {
            const search = document.getElementById('searchInput').value;
            const spec = document.getElementById('specializationSelect').value;
            
            let url = `${API_BASE}/api/doctors`;
            if (search) url += `?search=${encodeURIComponent(search)}`;
            if (spec) url += `${search ? '&' : '?'}specialization=${encodeURIComponent(spec)}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                doctors = data.doctors;
                renderDoctors();
            } catch(e) {
                document.getElementById('doctorsContainer').innerHTML = '<div class="loading">Failed to load doctors</div>';
            }
        }

        function renderDoctors() {
            const container = document.getElementById('doctorsContainer');
            if (!doctors.length) {
                container.innerHTML = '<div class="loading">No doctors found</div>';
                return;
            }
            
            container.innerHTML = doctors.map(doc => `
                <div class="doctor-card">
                    <div class="doctor-header">
                        <div class="doctor-avatar">👨‍⚕️</div>
                        <div>
                            <div class="doctor-name">
                                Dr. ${escapeHtml(doc.name)}
                                ${doc.is_verified ? '<span class="verified-badge">✓ Verified</span>' : ''}
                            </div>
                            <div class="doctor-specialization">${escapeHtml(doc.specialization)}</div>
                        </div>
                    </div>
                    <div class="doctor-rating">
                        <span class="rating-stars">${renderStars(doc.rating)}</span>
                        <span style="font-size:13px;">(${doc.total_consultations || 0} consults)</span>
                    </div>
                    <p style="font-size:13px; color:#4a5b5e; margin: 12px 0;">${escapeHtml(doc.bio?.substring(0, 100) || '')}</p>
                    <div class="doctor-fee">₹${doc.consultation_fee || 500} / consult</div>
                    <button class="consult-btn" onclick="openConsultModal(${doc.id}, 'Dr. ${escapeHtml(doc.name)}')">
                        📅 Request Consultation
                    </button>
                </div>
            `).join('');
        }

        function renderStars(rating) {
            rating = rating || 0;
            const full = Math.floor(rating);
            const half = rating % 1 >= 0.5;
            let stars = '';
            for (let i = 0; i < full; i++) stars += '★';
            if (half) stars += '½';
            for (let i = stars.length; i < 5; i++) stars += '☆';
            return stars;
        }

        function checkForPendingAssessment() {
            const lastAssessment = localStorage.getItem('last_assessment');
            if (lastAssessment) {
                try {
                    pendingAssessment = JSON.parse(lastAssessment);
                    showToast(`Based on your last assessment, we suggest consulting a ${pendingAssessment.suggested_specialist || 'specialist'}`);
                } catch(e) {}
            }
        }

        let selectedDoctor = null;
        function openConsultModal(doctorId, doctorName) {
            if (!sessionToken) {
                showToast('Please login to request consultation');
                setTimeout(() => location.href = 'index.html', 1500);
                return;
            }
            selectedDoctor = { id: doctorId, name: doctorName };
            document.getElementById('selectedDoctorId').value = doctorId;
            document.getElementById('selectedDoctorName').innerHTML = `Selected: ${doctorName}`;
            document.getElementById('consultModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('consultModal').classList.remove('active');
        }

        async function submitConsultation() {
            const message = document.getElementById('consultMessage').value;
            const doctorId = document.getElementById('selectedDoctorId').value;
            
            if (!doctorId) {
                showToast('Please select a doctor');
                return;
            }
            
            const requestBody = {
                doctor_id: parseInt(doctorId),
                symptoms_summary: message || "Patient requested consultation",
                predicted_disease: pendingAssessment?.top_disease || "",
                patient_message: message
            };
            
            if (pendingAssessment) {
                requestBody.assessment_id = pendingAssessment.id;
            }
            
            try {
                const res = await fetch(`${API_BASE}/api/consultations/request`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken },
                    body: JSON.stringify(requestBody)
                });
                if (res.ok) {
                    showToast('Consultation request sent! The doctor will respond shortly.');
                    closeModal();
                } else {
                    const err = await res.json();
                    showToast(err.detail || 'Failed to send request');
                }
            } catch(e) {
                showToast('Error sending request');
            }
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('searchInput').addEventListener('input', loadDoctors);
        document.getElementById('specializationSelect').addEventListener('change', loadDoctors);

        loadUser();
    </script>
</body>
</html>
