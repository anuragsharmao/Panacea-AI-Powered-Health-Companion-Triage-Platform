<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panacea — Pharmacy | Buy Medicines Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f7f6f3;
            color: #1e2a2e;
        }
        
        /* Navigation */
        .navbar {
            background: white;
            border-bottom: 1px solid #e2e4e0;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #2c7a6e, #3b82b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            gap: 32px;
            align-items: center;
        }
        .nav-links a {
            text-decoration: none;
            color: #4a5b5e;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: #2c7a6e;
        }
        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 24px;
        }
        .cart-count {
            position: absolute;
            top: -8px;
            right: -12px;
            background: #e74c3c;
            color: white;
            font-size: 11px;
            border-radius: 50%;
            padding: 2px 6px;
            font-weight: 600;
        }
        .profile-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 40px;
            background: #f0f7f5;
        }
        
        /* Main container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 40px;
        }
        
        /* Search & Filter */
        .search-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        .search-bar input {
            flex: 1;
            padding: 14px 20px;
            border: 1.5px solid #e2e4e0;
            border-radius: 16px;
            font-size: 15px;
            background: white;
        }
        .search-bar select {
            padding: 14px 20px;
            border: 1.5px solid #e2e4e0;
            border-radius: 16px;
            font-size: 14px;
            background: white;
            min-width: 180px;
        }
        .rx-filter {
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 8px 20px;
            border-radius: 16px;
            border: 1.5px solid #e2e4e0;
        }
        .rx-filter label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        /* Category Tabs */
        .category-tabs {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 16px;
            margin-bottom: 24px;
        }
        .category-tab {
            padding: 10px 24px;
            background: white;
            border: 1.5px solid #e2e4e0;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .category-tab.active {
            background: #2c7a6e;
            border-color: #2c7a6e;
            color: white;
        }
        
        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 24px;
        }
        .product-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #e2e4e0;
            transition: all 0.25s;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px -8px rgba(0,0,0,0.1);
        }
        .rx-badge {
            display: inline-block;
            background: #fff3cd;
            color: #856404;
            font-size: 10px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 20px;
            margin-bottom: 12px;
        }
        .otc-badge {
            background: #d4e6d9;
            color: #2d6a4f;
        }
        .product-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .generic-name {
            font-size: 12px;
            color: #8b9a9e;
            margin-bottom: 12px;
        }
        .strength {
            font-size: 13px;
            color: #4a5b5e;
            margin-bottom: 8px;
        }
        .price {
            font-size: 22px;
            font-weight: 700;
            color: #2c7a6e;
            margin: 12px 0;
        }
        .stock {
            font-size: 12px;
            color: #4a5b5e;
            margin-bottom: 12px;
        }
        .add-to-cart {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1e2a2e, #2c7a6e);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .add-to-cart:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(44,122,110,0.3);
        }
        .add-to-cart:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1e2a2e;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #8b9a9e;
        }
        
        @media (max-width: 768px) {
            .container { padding: 20px; }
            .navbar { padding: 12px 20px; }
            .search-bar { flex-direction: column; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">panacea</a>
        <div class="nav-links">
            <a href="assessment.html">Symptom Checker</a>
            <a href="pharmacy.html" class="active">Pharmacy</a>
            <a href="consultation.html">Consult Doctor</a>
            <a href="patient-dashboard.html">My Dashboard</a>
            <div class="cart-icon" onclick="location.href='cart.html'">
                🛒 <span class="cart-count" id="cartCount">0</span>
            </div>
            <div class="profile-badge" id="profileBadge">
                <span id="userName">Guest</span>
                <span>▼</span>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search medicines by name or generic...">
            <select id="categorySelect">
                <option value="">All Categories</option>
            </select>
            <div class="rx-filter">
                <label>
                    <input type="checkbox" id="rxOnlyFilter">
                    <span>🔒 Prescription Only</span>
                </label>
            </div>
        </div>

        <div class="category-tabs" id="categoryTabs">
            <button class="category-tab active" data-cat="">All</button>
        </div>

        <div id="productsContainer">
            <div class="loading">Loading medicines...</div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let currentUser = null;
        let sessionToken = localStorage.getItem('panacea_session_token');
        let cartCount = 0;
        let products = [];
        let categories = [];
        let currentFilters = { category: '', search: '', rxOnly: false };

        // Load user profile
        async function loadUser() {
            if (!sessionToken) return;
            try {
                const res = await fetch(`${API_BASE}/api/auth/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_token: sessionToken })
                });
                if (res.ok) {
                    const data = await res.json();
                    if (data.valid) {
                        currentUser = data.user;
                        document.getElementById('userName').innerText = currentUser.name?.split(' ')[0] || 'User';
                    }
                }
            } catch(e) {}
            loadCartCount();
        }

        async function loadCartCount() {
            if (!sessionToken) return;
            try {
                const res = await fetch(`${API_BASE}/api/cart`, {
                    headers: { 'X-Session-Token': sessionToken }
                });
                if (res.ok) {
                    const data = await res.json();
                    cartCount = data.count || 0;
                    document.getElementById('cartCount').innerText = cartCount;
                }
            } catch(e) {}
        }

        async function loadCategories() {
            try {
                const res = await fetch(`${API_BASE}/api/categories`);
                const data = await res.json();
                categories = data.categories;
                
                const select = document.getElementById('categorySelect');
                const tabs = document.getElementById('categoryTabs');
                
                categories.forEach(cat => {
                    // Add to select dropdown
                    const option = document.createElement('option');
                    option.value = cat.id;
                    option.textContent = cat.name;
                    select.appendChild(option);
                    
                    // Add to tabs
                    const tab = document.createElement('button');
                    tab.className = 'category-tab';
                    tab.setAttribute('data-cat', cat.id);
                    tab.textContent = cat.name;
                    tab.onclick = () => {
                        document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        currentFilters.category = cat.id;
                        loadProducts();
                    };
                    tabs.appendChild(tab);
                });
            } catch(e) {}
        }

        async function loadProducts() {
            document.getElementById('productsContainer').innerHTML = '<div class="loading">Loading...</div>';
            
            let url = `${API_BASE}/api/products?limit=100`;
            if (currentFilters.category) url += `&category_id=${currentFilters.category}`;
            if (currentFilters.search) url += `&search=${encodeURIComponent(currentFilters.search)}`;
            if (currentFilters.rxOnly) url += `&prescription_only=1`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                products = data.products;
                renderProducts();
            } catch(e) {
                document.getElementById('productsContainer').innerHTML = '<div class="loading">Failed to load products</div>';
            }
        }

        function renderProducts() {
            const container = document.getElementById('productsContainer');
            if (!products.length) {
                container.innerHTML = '<div class="loading">No medicines found</div>';
                return;
            }
            
            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <span class="rx-badge ${product.requires_prescription ? '' : 'otc-badge'}">
                        ${product.requires_prescription ? '🔒 Prescription Required' : '🟢 Over the Counter'}
                    </span>
                    <div class="product-name">${escapeHtml(product.name)}</div>
                    <div class="generic-name">${product.generic_name || ''}</div>
                    <div class="strength">${product.strength || ''} | ${product.dosage_form || ''}</div>
                    <div class="price">₹${product.price.toFixed(2)}</div>
                    <div class="stock">${product.stock_quantity > 0 ? `In Stock (${product.stock_quantity})` : 'Out of Stock'}</div>
                    <button class="add-to-cart" 
                            onclick="addToCart(${product.id})"
                            ${product.stock_quantity <= 0 ? 'disabled' : ''}>
                        ${product.stock_quantity > 0 ? 'Add to Cart' : 'Out of Stock'}
                    </button>
                </div>
            `).join('');
        }

        async function addToCart(productId) {
            if (!sessionToken) {
                showToast('Please login to add items to cart');
                setTimeout(() => location.href = 'index.html', 1500);
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/api/cart/add`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken },
                    body: JSON.stringify({ product_id: productId, quantity: 1 })
                });
                if (res.ok) {
                    showToast('Added to cart!');
                    loadCartCount();
                } else {
                    const err = await res.json();
                    showToast(err.detail || 'Failed to add');
                }
            } catch(e) {
                showToast('Error adding to cart');
            }
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentFilters.search = e.target.value;
            loadProducts();
        });
        
        document.getElementById('categorySelect').addEventListener('change', (e) => {
            currentFilters.category = e.target.value;
            // Update active tab
            document.querySelectorAll('.category-tab').forEach(tab => {
                if (tab.getAttribute('data-cat') == e.target.value || (!e.target.value && tab.getAttribute('data-cat') === '')) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });
            loadProducts();
        });
        
        document.getElementById('rxOnlyFilter').addEventListener('change', (e) => {
            currentFilters.rxOnly = e.target.checked;
            loadProducts();
        });

        // Initialize
        loadUser();
        loadCategories();
        loadProducts();
    </script>
</body>
</html>
